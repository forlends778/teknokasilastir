<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeknoKarşılaştır — Akıllı Teknoloji Rehberi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b10;--surface:#0f1318;--card:#141920;--border:#1e2530;--accent:#f0a500;--accent2:#00c9a7;--danger:#ff4d6d;--text:#e8edf5;--muted:#5a6475;--soft:#9aa3b0;}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(240,165,0,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,201,167,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;background:rgba(8,11,16,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;color:var(--text);cursor:pointer;}
.logo span{color:var(--accent)}
.compare-btn{display:flex;align-items:center;gap:8px;background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.3);color:var(--accent);padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.compare-btn:hover{background:rgba(240,165,0,0.2)}
.compare-count{background:var(--accent);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.page{display:none;position:relative;z-index:1}.page.active{display:block}
.hero{text-align:center;padding:80px 20px 60px;}
.hero-badge{display:inline-block;background:rgba(0,201,167,0.1);border:1px solid rgba(0,201,167,0.25);color:var(--accent2);font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:6px 18px;border-radius:100px;margin-bottom:24px;}
.hero h1{font-family:'Bebas Neue',cursive;font-size:clamp(52px,10vw,96px);line-height:0.95;letter-spacing:3px;margin-bottom:20px;}
.hero h1 .line2{color:var(--accent)}
.hero p{color:var(--soft);font-size:16px;max-width:480px;margin:0 auto}
.search-wrap{max-width:520px;margin:0 auto 40px;position:relative;}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px 14px 48px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--accent)}.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;pointer-events:none;}
.cat-tabs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;padding:0 20px;}
.cat-tab{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:8px 22px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--soft);font-family:'DM Sans',sans-serif;}
.cat-tab.active,.cat-tab:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 20px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;animation:fadeUp 0.5s ease both;position:relative;}
.card:hover{transform:translateY(-4px);border-color:rgba(240,165,0,0.4);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.card-img{height:200px;background:#0d1117;position:relative;overflow:hidden;}
.card-img svg{width:100%;height:100%;position:absolute;inset:0;}
.card-body{padding:20px}
.card-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);font-weight:600;margin-bottom:8px;}
.card-name{font-size:17px;font-weight:700;margin-bottom:6px;line-height:1.3}
.card-tagline{font-size:13px;color:var(--soft);margin-bottom:16px}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-size:18px;font-weight:700;color:var(--accent)}
.card-score{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--soft);}
.star{color:var(--accent);font-size:14px}
.add-compare{position:absolute;top:12px;right:12px;background:rgba(8,11,16,0.75);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--soft);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(8px);}
.add-compare:hover,.add-compare.added{background:rgba(240,165,0,0.15);border-color:var(--accent);color:var(--accent);}
.badge-hot{position:absolute;top:12px;left:12px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:100px;text-transform:uppercase;z-index:2;}
#detail-page{padding:0 20px 80px}
.detail-wrap{max-width:960px;margin:0 auto}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--soft);font-size:14px;font-weight:600;cursor:pointer;padding:20px 0;transition:color 0.2s;background:none;border:none;font-family:'DM Sans',sans-serif;}
.back-btn:hover{color:var(--accent)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:8px;}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}}
.detail-img{background:#0d1117;border:1px solid var(--border);border-radius:20px;height:360px;position:relative;overflow:hidden;}
.detail-img svg{width:100%;height:100%;position:absolute;inset:0;}
.detail-cat{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);font-weight:600;margin-bottom:12px;}
.detail-name{font-family:'Bebas Neue',cursive;font-size:clamp(36px,5vw,52px);letter-spacing:2px;line-height:1;margin-bottom:8px;}
.detail-tagline{color:var(--soft);font-size:15px;margin-bottom:24px}
.detail-score{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.big-score{font-size:40px;font-weight:700;color:var(--accent);font-family:'Bebas Neue',cursive;letter-spacing:2px;}
.score-stars{display:flex;gap:2px;font-size:20px}
.detail-price{font-size:32px;font-weight:700;color:var(--text);margin-bottom:28px;}
.detail-price span{font-size:14px;color:var(--muted);font-weight:400}
.trendyol-btn{display:block;width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:16px;text-align:center;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;text-decoration:none;margin-bottom:12px;}
.trendyol-btn:hover{background:#e09600;transform:translateY(-1px);box-shadow:0 6px 24px rgba(240,165,0,0.3)}
.add-compare-detail{display:block;width:100%;background:transparent;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--soft);cursor:pointer;transition:all 0.2s;}
.add-compare-detail:hover{border-color:var(--accent);color:var(--accent)}
.specs-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;margin:36px 0 16px;}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.spec-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.spec-label{font-size:11px;color:var(--muted);margin-bottom:4px}.spec-value{font-size:14px;font-weight:600}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:32px;}
.pros,.cons{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.pros{border-top:3px solid var(--accent2)}.cons{border-top:3px solid var(--danger)}
.pc-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:12px}
.pros .pc-title{color:var(--accent2)}.cons .pc-title{color:var(--danger)}
.pc-item{font-size:13px;color:var(--soft);margin-bottom:8px;padding-left:16px;position:relative}
.pc-item::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%}
.pros .pc-item::before{background:var(--accent2)}.cons .pc-item::before{background:var(--danger)}
#compare-page{padding:20px 20px 80px}
.compare-wrap{max-width:1000px;margin:0 auto}
.compare-wrap h2{font-family:'Bebas Neue',cursive;font-size:40px;letter-spacing:2px;margin-bottom:8px;}
.compare-wrap .sub{color:var(--soft);font-size:14px;margin-bottom:32px}
.compare-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);}
.compare-table th{background:var(--surface);padding:20px;text-align:center;font-size:15px;font-weight:700;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.compare-table th:first-child{text-align:left;width:140px}
.compare-table td{padding:16px 20px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:14px;}
.compare-table td:first-child{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:left;}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td:last-child,.compare-table th:last-child{border-right:none}
.compare-table tr:hover td{background:rgba(255,255,255,0.02)}
.remove-col{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;margin-left:8px;transition:color 0.2s;vertical-align:middle;}
.remove-col:hover{color:var(--danger)}
.empty-compare{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-compare .icon{font-size:48px;margin-bottom:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.4s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;color:var(--text);z-index:999;transition:transform 0.3s;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

<nav>
  <div class="logo" onclick="showPage('home')">Tekno<span>Karşılaştır</span></div>

</nav>

<div id="home-page" class="page active">
  <div class="hero">
    <div class="hero-badge">🇹🇷 Türkiye'nin Teknoloji Rehberi</div>
    <h1>TEKNO<br><span class="line2">KARŞILAŞTIR</span></h1>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Ürün ara... (iPhone, MacBook, AirPods...)" oninput="filterProducts()">
  </div>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="filterCat('Tümü',this)">Tümü</button>
    <button class="cat-tab" onclick="filterCat('Telefon',this)">📱 Telefonlar</button>
    <button class="cat-tab" onclick="filterCat('Laptop',this)">💻 Laptoplar</button>
    <button class="cat-tab" onclick="filterCat('Kulaklık',this)">🎧 Kulaklıklar</button>
  </div>
  <div class="grid-wrap"><div class="grid" id="product-grid"></div></div>
</div>

<div id="detail-page" class="page">
  <div class="detail-wrap">
    <button class="back-btn" onclick="showPage('home')">← Ürünlere Dön</button>
    <div id="detail-content"></div>
  </div>
</div>

<div id="compare-page" class="page">
  <div class="compare-wrap">
    <button class="back-btn" onclick="showPage('home')">← Ürünlere Dön</button>
    <h2>KARŞILAŞTIRMA</h2>
    <p class="sub">Seçili ürünleri yan yana karşılaştır</p>
    <div id="compare-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

var currentCat = 'Tümü', compareList = [], searchTerm = '';

function renderGrid() {
  var grid = document.getElementById('product-grid');
  var filtered = PRODUCTS.filter(function(p) {
    return (currentCat === 'Tümü' || p.cat === currentCat) &&
      (p.name.toLowerCase().indexOf(searchTerm.toLowerCase()) > -1 || p.tagline.toLowerCase().indexOf(searchTerm.toLowerCase()) > -1);
  });
  grid.innerHTML = filtered.map(function(p, i) {
    var inC = compareList.indexOf(p.id) > -1;
    return '<div class="card" style="animation-delay:' + (i*0.06) + 's" onclick="showDetail(' + p.id + ')">' +
      (p.hot ? '<span class="badge-hot">🔥 Popüler</span>' : '') +
      '<button class="add-compare ' + (inC ? 'added' : '') + '" onclick="toggleCompare(event,' + p.id + ')">' + (inC ? '✓ Seçildi' : '+ Karşılaştır') + '</button>' +
      '<div class="card-img">' + getSVG(p.type, p.c1, p.c2, p.ac) + '</div>' +
      '<div class="card-body"><div class="card-cat">' + p.cat + '</div><div class="card-name">' + p.name + '</div>' +
      '<div class="card-tagline">' + p.tagline + '</div>' +
      '<div class="card-footer"><div class="card-price">' + p.price + '</div><div class="card-score"><span class="star">★</span> ' + p.score + '</div></div></div></div>';
  }).join('');
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  renderGrid();
}

function filterProducts() {
  searchTerm = document.getElementById('search-input').value;
  renderGrid();
}

function showDetail(id) {
  var p = PRODUCTS.filter(function(x) { return x.id === id; })[0];
  if (!p) return;
  var specs = Object.keys(p.specs).map(function(k) {
    return '<div class="spec-item"><div class="spec-label">' + k + '</div><div class="spec-value">' + p.specs[k] + '</div></div>';
  }).join('');
  var pros = p.pros.map(function(x) { return '<div class="pc-item">' + x + '</div>'; }).join('');
  var cons = p.cons.map(function(x) { return '<div class="pc-item">' + x + '</div>'; }).join('');
  var stars = '★★★★★'.substr(0, p.stars) + '☆☆☆☆☆'.substr(0, 5 - p.stars);
  var inC = compareList.indexOf(p.id) > -1;
  document.getElementById('detail-content').innerHTML =
    '<div class="detail-grid fade-in"><div class="detail-img">' + getSVG(p.type,p.c1,p.c2,p.ac) + '</div>' +
    '<div class="detail-info"><div class="detail-cat">' + p.cat + '</div><div class="detail-name">' + p.name + '</div>' +
    '<div class="detail-tagline">' + p.tagline + '</div>' +
    '<div class="detail-score"><div class="big-score">' + p.score + '</div><div><div class="score-stars">' + stars + '</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Uzman Puanı</div></div></div>' +
    '<div class="detail-price">' + p.price + ' <span>Trendyol\'da</span></div>' +
    '<a class="trendyol-btn" href="' + p.link + '" target="_blank">🛍️ Trendyol\'da İncele</a>' +
    '<button class="add-compare-detail" onclick="toggleCompare(null,' + p.id + ')">' + (inC ? '✓ Karşılaştırmadan Çıkar' : '⚖️ Karşılaştırmaya Ekle') + '</button></div></div>' +
    '<div><div class="specs-title">Teknik Özellikler</div><div class="specs-grid">' + specs + '</div>' +
    '<div class="pros-cons"><div class="pros"><div class="pc-title">✅ Artılar</div>' + pros + '</div><div class="cons"><div class="pc-title">❌ Eksiler</div>' + cons + '</div></div></div>';
  showPage('detail');
  window.scrollTo(0,0);
}

function toggleCompare(e, id) {
  if (e) e.stopPropagation();
  var idx = compareList.indexOf(id);
  var p = PRODUCTS.filter(function(x) { return x.id === id; })[0];
  if (idx === -1) {
    if (compareList.length >= 3) { showToast('⚠️ En fazla 3 ürün karşılaştırabilirsiniz'); return; }
    compareList.push(id);
    showToast('✓ "' + p.name + '" karşılaştırmaya eklendi');
  } else {
    compareList.splice(idx, 1);
    showToast('"' + p.name + '" çıkarıldı');
  }
  document.getElementById('compare-count').textContent = compareList.length;
  renderGrid();
  var btn = document.querySelector('.add-compare-detail');
  if (btn) btn.textContent = compareList.indexOf(id) > -1 ? '✓ Karşılaştırmadan Çıkar' : '⚖️ Karşılaştırmaya Ekle';
}

function renderCompare() {
  var wrap = document.getElementById('compare-content');
  if (!compareList.length) {
    wrap.innerHTML = '<div class="empty-compare"><div class="icon">⚖️</div><p>Henüz ürün eklemediniz.<br>Kartlardaki "+ Karşılaştır" butonuna tıklayın.</p></div>';
    return;
  }
  var items = compareList.map(function(id) { return PRODUCTS.filter(function(x) { return x.id === id; })[0]; });
  var allKeys = [];
  items.forEach(function(p) { Object.keys(p.specs).forEach(function(k) { if (allKeys.indexOf(k) < 0) allKeys.push(k); }); });
  var headers = items.map(function(p) {
    return '<th><div style="width:80px;height:56px;border-radius:8px;overflow:hidden;position:relative;margin:0 auto 10px">' + getSVG(p.type,p.c1,p.c2,p.ac) + '</div><div>' + p.name + '</div><div style="color:var(--accent);font-size:16px;margin-top:6px">' + p.price + '</div><button class="remove-col" onclick="removeCompare(' + p.id + ')">✕</button></th>';
  }).join('');
  var scoreRow = '<tr style="background:rgba(240,165,0,0.05)"><td>⭐ Puan</td>' + items.map(function(p) { return '<td style="color:var(--accent);font-weight:700;font-size:18px">' + p.score + '</td>'; }).join('') + '</tr>';
  var rows = allKeys.map(function(k) {
    return '<tr><td>' + k + '</td>' + items.map(function(p) { return '<td>' + (p.specs[k] || '—') + '</td>'; }).join('') + '</tr>';
  }).join('');
  wrap.innerHTML = '<div style="overflow-x:auto"><table class="compare-table fade-in"><thead><tr><th>Özellik</th>' + headers + '</tr></thead><tbody>' + scoreRow + rows + '</tbody></table></div>';
}

function removeCompare(id) {
  compareList = compareList.filter(function(x) { return x !== id; });
  document.getElementById('compare-count').textContent = compareList.length;
  renderCompare();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(name + '-page').classList.add('active');
  if (name === 'compare') renderCompare();
  window.scrollTo(0,0);
}

var _toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

renderGrid();
</script>
